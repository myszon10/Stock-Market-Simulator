name: CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Start PostgreSQL and run tests
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:55432/stock_market
          DB_USER: simulator_user
          DB_PASSWORD: simulator_pass
          MARKET_DATA_MODE: mock
        run: |
          docker run -d \
            --name ci-postgres \
            -e POSTGRES_USER=simulator_user \
            -e POSTGRES_PASSWORD=simulator_pass \
            -e POSTGRES_DB=stock_market \
            -p 55432:5432 \
            postgres:16-alpine

          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if docker exec ci-postgres pg_isready -U simulator_user -d stock_market; then
              echo "PostgreSQL is ready"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "PostgreSQL did not become ready in time"
              docker logs ci-postgres
              exit 1
            fi

            sleep 2
          done

          docker ps
          sbt test

      - uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/target/test-reports/**/*.xml

      - name: Stop PostgreSQL
        if: always()
        run: |
          docker rm -f ci-postgres || true