name: CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DB_URL: jdbc:postgresql://localhost:5432/stock_market
      DB_USER: simulator_user
      DB_PASSWORD: simulator_pass
      MARKET_DATA_MODE: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Start PostgreSQL
        working-directory: backend
        run: docker compose up -d db

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec stock-market-simulator-db pg_isready -U simulator_user -d stock_market; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL..."
            sleep 2
          done

          echo "PostgreSQL did not become ready in time"
          docker logs stock-market-simulator-db
          exit 1

      - name: Run tests
        working-directory: backend
        run: sbt test

      - uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: backend/target/test-reports/**/*.xml

      - name: Stop PostgreSQL
        if: always()
        working-directory: backend
        run: docker compose down -v