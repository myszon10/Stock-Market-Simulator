# https://www.playframework.com/documentation/latest/Configuration
db.default.driver=org.postgresql.Driver
db.default.url = "jdbc:postgresql://localhost:5433/stock_market"
db.default.url = ${?DB_URL}

db.default.username = "simulator_user"
db.default.username = ${?DB_USER}

db.default.password = "simulator_pass"
db.default.password = ${?DB_PASSWORD}

play.evolutions.db.default.autoApply=true

play.filters.disabled += "play.filters.csrf.CSRFFilter"

# Market data configuration
# Default mode is "mock", so the application works locally without an API key.
# To use Finnhub in the future, set:
# MARKET_DATA_MODE=finnhub
# FINNHUB_API_KEY=your_api_key_here

marketData {
  mode = "mock"
  mode = ${?MARKET_DATA_MODE}

  cacheTtlSeconds = 60
  cacheTtlSeconds = ${?MARKET_DATA_CACHE_TTL_SECONDS}
}

finnhub {
  apiKey = ${?FINNHUB_API_KEY}
}