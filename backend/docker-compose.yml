services:
  db:
    image: postgres:16-alpine
    container_name: stock-market-simulator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: simulator_user
      POSTGRES_PASSWORD: simulator_pass
      POSTGRES_DB: stock_market
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulator_user -d stock_market"]
      interval: 5s
      timeout: 3s
      retries: 5